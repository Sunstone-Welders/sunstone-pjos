			outputPaths = (
			);
			runOnlyForDeploymentPostprocessing = 0;
			shellPath = /bin/sh;
			shellScript = "# Extract nested frameworks from SquareMobilePaymentsSDK to top-level Frameworks/\nSQUARE_NESTED_FRAMEWORKS=\"${BUILT_PRODUCTS_DIR}/${FRAMEWORKS_FOLDER_PATH}/SquareMobilePaymentsSDK.framework/Frameworks\"\n\nif [ -d \"$SQUARE_NESTED_FRAMEWORKS\" ]; then\n    echo \"Extracting Square nested frameworks...\"\n    for framework in \"$SQUARE_NESTED_FRAMEWORKS\"/*.framework; do\n        if [ -d \"$framework\" ]; then\n            framework_name=$(basename \"$framework\")\n            dest=\"${BUILT_PRODUCTS_DIR}/${FRAMEWORKS_FOLDER_PATH}/$framework_name\"\n            echo \"Copying $framework_name to top-level Frameworks/\"\n            cp -Rf \"$framework\" \"$dest\"\n            # Re-sign the extracted framework\n            codesign --force --sign \"${EXPANDED_CODE_SIGN_IDENTITY}\" --preserve-metadata=identifier,entitlements --timestamp=none \"$dest\"\n        fi\n    done\n    # Remove the nested Frameworks dir to avoid App Store rejection for nested frameworks\n    rm -rf \"$SQUARE_NESTED_FRAMEWORKS\"\n    echo \"Square nested frameworks extracted successfully\"\nelse\n    echo \"No Square nested frameworks found (SDK may not be present)\"\nfi\n";
